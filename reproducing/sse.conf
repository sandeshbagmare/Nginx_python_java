# client -> NGINX(:8088) -> Tomcat servlet(:8080) -> Uvicorn(:8000)
# Log paths are relative to the nginx prefix (-p ../nginx-1.31.1).
worker_processes  1;
error_log  logs/error.log  info;
pid        logs/nginx.pid;
events { worker_connections 64; }
http {
    access_log   logs/access.log;
    default_type application/octet-stream;
    server {
        listen 127.0.0.1:8088;
        location / {
            proxy_pass http://127.0.0.1:8080;   # the Tomcat servlet
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;                # SSE-friendly (does NOT suppress the dup-TE rejection)
            proxy_cache off;
            proxy_read_timeout 1h;
        }
    }
}
