# Front-door NGINX: client -> NGINX(:8088) -> Java proxy(:8080) -> Uvicorn(:8000)
#
# Log paths are RELATIVE to the nginx prefix (-p), so run nginx with:
#     nginx.exe -p <repo>/nginx-1.31.1 -c <repo>/nginx/sse.conf
# and logs land in nginx-1.31.1/logs/.

worker_processes  1;
error_log  logs/error.log  info;     # "info" so we see the duplicate-header line
pid        logs/nginx.pid;

events { worker_connections 64; }

http {
    access_log   logs/access.log;
    default_type application/octet-stream;

    server {
        listen 127.0.0.1:8088;

        location / {
            proxy_pass http://127.0.0.1:8080;   # the Java proxy
            proxy_http_version 1.1;
            proxy_set_header Connection "";      # keepalive-friendly; unrelated to the bug

            # SSE-friendly settings, so buffering is NOT the variable under test.
            # NOTE: none of these suppress the duplicate-Transfer-Encoding rejection.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }
    }
}
